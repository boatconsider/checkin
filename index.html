<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>CKD Studio — เช็คอิน</title>
  <style>
    :root{
      --crimson:#7B1C2A;--crimson-dark:#5a1320;--crimson-hover:#f0e6e8;
      --silver:#8a8a8a;--silver-light:#d4d4d4;
      --bg:#f5f0f0;--white:#fff;
      --green:#1e7a3a;--green-bg:#e8f5ec;
      --shadow:0 4px 24px rgba(123,28,42,.10);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Segoe UI',sans-serif;background:var(--bg);min-height:100vh;padding:16px;}
    .topbar{
      display:flex;align-items:center;justify-content:space-between;
      background:var(--white);border-radius:14px;padding:12px 18px;
      box-shadow:var(--shadow);margin-bottom:16px;
    }
    .logo-small{display:flex;align-items:center;gap:10px;}
    .user-chip{
      background:var(--crimson);color:var(--white);border-radius:20px;
      padding:5px 14px;font-size:12px;font-weight:700;
      cursor:pointer;border:none;
    }
    .card{background:var(--white);border-radius:16px;box-shadow:var(--shadow);padding:22px 20px 26px;margin-bottom:14px;}
    .card-title{font-size:14px;font-weight:700;color:var(--crimson);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;display:flex;align-items:center;gap:6px;}
    .profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px;}
    .p-item label{font-size:10px;color:var(--silver);text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:2px;}
    .p-item span{font-size:15px;font-weight:600;color:#333;}
    .photo-box{
      border:2px dashed var(--silver-light);border-radius:12px;
      padding:20px;text-align:center;cursor:pointer;
      transition:border .18s,background .18s;background:var(--bg);
    }
    .photo-box:hover{border-color:var(--crimson);background:var(--crimson-hover);}
    .photo-box.has-photo{border:2px solid var(--green);background:var(--green-bg);cursor:default;}
    .photo-box img{max-width:100%;border-radius:8px;display:block;margin:0 auto 8px;max-height:200px;object-fit:cover;}
    .photo-icon{font-size:36px;margin-bottom:8px;}
    .photo-label{font-size:14px;font-weight:600;color:var(--silver);}
    .photo-ok{font-size:13px;color:var(--green);font-weight:700;margin-top:8px;}
    .status-section{display:none;}
    .status-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
    .s-btn{
      padding:14px 8px;border-radius:12px;border:2px solid var(--silver-light);
      background:var(--white);font-size:13px;font-weight:700;cursor:pointer;
      transition:all .18s;text-align:center;color:#555;
    }
    .s-btn:hover{border-color:var(--crimson);color:var(--crimson);}
    .s-btn.active{border-color:var(--crimson);background:var(--crimson);color:var(--white);}
    .s-emoji{font-size:22px;display:block;margin-bottom:4px;}
    .loc-box{background:var(--bg);border-radius:10px;padding:12px 14px;font-size:13px;color:#555;margin-bottom:14px;}
    .loc-ok{color:var(--green);font-weight:600;}
    .loc-err{color:var(--crimson);font-weight:600;}
    .note-box{display:none;margin-bottom:14px;}
    textarea{width:100%;padding:12px;border-radius:10px;border:1.5px solid var(--silver-light);font-size:14px;font-family:inherit;resize:vertical;min-height:80px;outline:none;transition:border .18s;}
    textarea:focus{border-color:var(--crimson);}
    .btn{width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:700;border:none;cursor:pointer;transition:background .18s;}
    .btn-primary{background:var(--crimson);color:var(--white);}
    .btn-primary:hover{background:var(--crimson-dark);}
    .btn-primary:disabled{opacity:.45;cursor:not-allowed;}
    #toast{
      position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);
      background:#1a1a1a;color:#fff;padding:12px 24px;border-radius:30px;
      font-size:14px;font-weight:600;transition:transform .3s,opacity .3s;opacity:0;
      max-width:90%;text-align:center;z-index:999;
    }
    #toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
    #toast.success{background:var(--green);}
    #toast.error{background:var(--crimson);}
    .spinner{display:none;width:22px;height:22px;margin:10px auto;border:3px solid #eee;border-top-color:var(--crimson);border-radius:50%;animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo-small">
    <svg width="90" height="32" viewBox="0 0 290 90" fill="none">
      <text x="2"   y="76" font-family="Georgia,serif" font-size="84" fill="#7B1C2A">C</text>
      <text x="80"  y="76" font-family="Georgia,serif" font-size="84" fill="#7B1C2A">K</text>
      <text x="158" y="76" font-family="Georgia,serif" font-size="84" fill="#7B1C2A">D</text>
      <polygon points="185,30 208,46 185,62" fill="#7B1C2A"/>
      <text x="88" y="89" font-family="Segoe UI,Arial,sans-serif" font-size="13" fill="#8a8a8a" letter-spacing="7">STUDIO</text>
    </svg>
  </div>
  <button class="user-chip" onclick="logout()">🚪 ออกจากระบบ</button>
</div>

<div class="card">
  <div class="card-title">👤 ข้อมูลพนักงาน</div>
  <div class="profile-grid" id="profile-grid">
    <div style="grid-column:1/-1;text-align:center;color:var(--silver);padding:10px;">กำลังโหลด...</div>
  </div>
</div>

<div class="card">
  <div class="card-title">📷 ถ่ายรูปเช็คอิน</div>
  <div class="photo-box" id="photo-box" onclick="openCamera()">
    <div class="photo-icon">📷</div>
    <div class="photo-label">กดเพื่อเปิดกล้องถ่ายรูป</div>
  </div>
  <div class="spinner" id="photo-spinner"></div>
</div>

<div class="card status-section" id="status-section">
  <div class="card-title">✅ เลือกประเภทการเช็คอิน</div>
  <div class="loc-box" id="loc-box">📍 กำลังดึงพิกัด...</div>
  <div class="status-grid" id="status-grid"></div>
  <div class="note-box" id="note-box">
    <label style="font-size:13px;font-weight:600;color:var(--silver);display:block;margin-bottom:6px;" id="note-label">📝 บันทึกงานวันนี้</label>
    <textarea id="note-input" placeholder="กรอกรายละเอียดงาน..."></textarea>
  </div>
  <button class="btn btn-primary" id="save-btn" onclick="saveCheckin()" disabled>💾 บันทึกการเช็คอิน</button>
  <div class="spinner" id="save-spinner"></div>
</div>

<div id="toast"></div>

<script>
  const SCRIPT_URL = '<?= ScriptApp.getService().getUrl() ?>';
  const GITHUB_CAM = 'https://boatconsider.github.io/checkin/';
  const username   = '<?= username ?>';
  const userData   = JSON.parse('<?= userData ?>');
  const infoData   = JSON.parse('<?= infoData ?>');
  const photoReady = '<?= photoReady ?>';

  let currentCoords  = '';
  let systemCoords   = '';
  let selectedStatus = '';
  let photoFileId    = '';
  let photoSent      = false;

  window.onload = function() {
    renderProfile();
    getLocation();

    // ✅ รับ fileId กลับจาก GitHub Pages ผ่าน URL parameter
    const urlParams = new URLSearchParams(window.location.search);
    const fileId    = urlParams.get('fileId')  || '';
    const photoOk   = urlParams.get('photoOk') || '';

    if (photoOk === '1' && fileId) {
      // รูปถูกส่งไป Telegram แล้วจาก GitHub Pages
      photoFileId = fileId;
      photoSent   = true;

      const box = document.getElementById('photo-box');
      box.classList.add('has-photo');
      box.onclick = null;
      box.innerHTML = `
        <div style="font-size:48px;margin-bottom:8px;">✅</div>
        <div class="photo-ok">ส่งรูปไป Telegram สำเร็จแล้ว!</div>`;

      renderStatusButtons();
      document.getElementById('status-section').style.display = 'block';
    }
  };

  function renderProfile() {
    const grid = document.getElementById('profile-grid');
    if (!userData || Object.keys(userData).length === 0) {
      grid.innerHTML = '<div style="grid-column:1/-1;color:red;">❌ ไม่พบข้อมูลพนักงาน</div>';
      return;
    }
    const fields = [
      { label:'ชื่อ-นามสกุล', value: (userData.firstName||'') + ' ' + (userData.lastName||'') },
      { label:'ตำแหน่ง',      value: userData.position || '-' },
      { label:'Username',      value: userData.username || username },
      { label:'เบอร์โทร',     value: userData.phone    || '-' }
    ];
    grid.innerHTML = fields.map(f => `
      <div class="p-item">
        <label>${f.label}</label>
        <span>${(f.value||'').trim() || '-'}</span>
      </div>`).join('');
  }

  // ✅ เปิดกล้องไปที่ GitHub Pages พร้อมส่ง scriptUrl ไปด้วย
  function openCamera() {
    if (photoSent) return;
    const camUrl = GITHUB_CAM
      + '?returnUrl=' + encodeURIComponent(SCRIPT_URL)
      + '&user='      + encodeURIComponent(username);
    window.location.href = camUrl;
  }

  const statusConfig = [
    { key:'เข้างาน',   emoji:'🟢', note:'วันนี้จะทำอะไร',         time:'8:30'  },
    { key:'พักเที่ยง', emoji:'🟡', note:'วันนี้ทำอะไรไปแล้วบ้าง', time:'11:30' },
    { key:'เลิกงาน',  emoji:'🔴', note:'สรุปสิ่งที่ทำวันนี้',      time:'17:30' }
  ];

  function renderStatusButtons() {
    const grid = document.getElementById('status-grid');
    const availableKeys = (infoData || []).map(r => r.status);
    const filtered = availableKeys.length > 0
      ? statusConfig.filter(s => availableKeys.includes(s.key))
      : statusConfig;
    grid.innerHTML = filtered.map(s => `
      <button class="s-btn" data-key="${s.key}" onclick="selectStatus('${s.key}')">
        <span class="s-emoji">${s.emoji}</span>
        ${s.key}<br>
        <small style="font-size:10px;font-weight:400;opacity:.7">${s.time}</small>
      </button>`).join('');
  }

  function selectStatus(status) {
    selectedStatus = status;
    document.querySelectorAll('.s-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.key === status);
    });
    const cfg = statusConfig.find(s => s.key === status);
    document.getElementById('note-box').style.display = 'block';
    document.getElementById('note-label').textContent = '📝 ' + (cfg ? cfg.note : 'บันทึกงาน');
    document.getElementById('note-input').placeholder = (cfg ? cfg.note : 'บันทึกงาน') + '...';
    const row = (infoData || []).find(r => r.status === status);
    systemCoords = row ? (row.coords || '') : '';
    checkDistance();
    checkSaveReady();
  }

  function getLocation() {
    if (!navigator.geolocation) {
      document.getElementById('loc-box').innerHTML = '❌ เบราว์เซอร์ไม่รองรับ GPS';
      return;
    }
    navigator.geolocation.getCurrentPosition(pos => {
      currentCoords = pos.coords.latitude.toFixed(6) + ', ' + pos.coords.longitude.toFixed(6);
      document.getElementById('loc-box').innerHTML = '📍 พิกัดปัจจุบัน: <strong>' + currentCoords + '</strong>';
      if (selectedStatus) checkDistance();
    }, err => {
      document.getElementById('loc-box').innerHTML = '<span class="loc-err">❌ ดึงพิกัดไม่ได้: ' + err.message + '</span>';
    }, { enableHighAccuracy:true, timeout:10000 });
  }

  function checkDistance() {
    if (!currentCoords || !systemCoords) return;
    const dist = calcDistance(currentCoords, systemCoords);
    const box  = document.getElementById('loc-box');
    if (dist === null) { box.innerHTML = '❌ พิกัดในระบบไม่ถูกต้อง'; return; }
    const ok = dist <= 100;
    box.innerHTML = `📍 พิกัดปัจจุบัน: <strong>${currentCoords}</strong><br>
      <span class="${ok?'loc-ok':'loc-err'}">
        ${ok?'✅':'❌'} ระยะห่าง: ${Math.round(dist)} เมตร ${ok?'(อยู่ในพื้นที่)':'(ไกลเกินไป!)'}
      </span>`;
    checkSaveReady();
  }

  function calcDistance(c1, c2) {
    try {
      const [la1,lo1] = c1.split(',').map(s => parseFloat(s.trim()));
      const [la2,lo2] = c2.split(',').map(s => parseFloat(s.trim()));
      if ([la1,lo1,la2,lo2].some(isNaN)) return null;
      const R=6371000, φ1=la1*Math.PI/180, φ2=la2*Math.PI/180;
      const dφ=(la2-la1)*Math.PI/180, dλ=(lo2-lo1)*Math.PI/180;
      const a=Math.sin(dφ/2)**2+Math.cos(φ1)*Math.cos(φ2)*Math.sin(dλ/2)**2;
      return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
    } catch(e){ return null; }
  }

  function checkSaveReady() {
    const dist = (currentCoords && systemCoords) ? calcDistance(currentCoords, systemCoords) : null;
    document.getElementById('save-btn').disabled = !(photoSent && selectedStatus && currentCoords && dist !== null && dist <= 100);
  }

  async function saveCheckin() {
    const note = document.getElementById('note-input').value.trim();
    if (!note) { showToast('กรุณากรอกบันทึกงานก่อนครับ', 'error'); return; }
    document.getElementById('save-btn').disabled = true;
    document.getElementById('save-spinner').style.display = 'block';
    const fd = new FormData();
    fd.append('action',        'saveCheckin');
    fd.append('username',      username);
    fd.append('status',        selectedStatus);
    fd.append('currentCoords', currentCoords);
    fd.append('systemCoords',  systemCoords);
    fd.append('workNote',      note);
    fd.append('photoFileId',   photoFileId);
    try {
      const resp = await fetch(SCRIPT_URL, { method:'POST', body:fd, redirect:'follow' });
      const data = await resp.json();
      document.getElementById('save-spinner').style.display = 'none';
      if (data.ok) {
        showToast('✅ ' + data.msg, 'success');
        setTimeout(() => {
          document.getElementById('status-section').innerHTML = `
            <div style="text-align:center;padding:30px 10px;">
              <div style="font-size:48px;margin-bottom:12px;">✅</div>
              <div style="font-size:17px;font-weight:700;color:var(--green);">เช็คอิน "${selectedStatus}" เรียบร้อย!</div>
              <div style="font-size:13px;color:var(--silver);margin-top:6px;">${new Date().toLocaleString('th-TH')}</div>
            </div>`;
        }, 1500);
      } else {
        showToast('❌ ' + data.msg, 'error');
        document.getElementById('save-btn').disabled = false;
      }
    } catch(err) {
      document.getElementById('save-spinner').style.display = 'none';
      showToast('❌ ' + err.message, 'error');
      document.getElementById('save-btn').disabled = false;
    }
  }

  function logout() { sessionStorage.clear(); window.location.href = SCRIPT_URL; }

  function showToast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'show ' + type;
    setTimeout(() => { t.className = ''; }, 3500);
  }
</script>
</body>
</html>
